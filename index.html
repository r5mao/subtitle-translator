<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- If you serve this page from a static server (not Flask), point it at your API: -->
    <!-- <meta name="subtitle-translator-api-base" content="http://127.0.0.1:5000"> -->
    <title>SRT Subtitle Translator</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <div class="container">
    <h1>🎬 Subtitle Translator</h1>
        <form id="translationForm" enctype="multipart/form-data">
            <div class="form-group source-mode-group">
                <span class="label-like">Subtitle source</span>
                <div class="source-mode-toggle" role="radiogroup" aria-label="Subtitle source">
                    <label class="source-mode-option">
                        <input type="radio" name="subtitleSource" id="sourceSearch" value="search" checked>
                        Search OpenSubtitles
                    </label>
                    <label class="source-mode-option">
                        <input type="radio" name="subtitleSource" id="sourceUpload" value="upload">
                        Upload file
                    </label>
                </div>
                <p class="hint-text" id="opensubtitlesHint" hidden></p>
            </div>

            <div class="form-group" id="searchPanel">
                <label for="osQuery">Movie or show title</label>
                <div class="os-search-row">
                    <input type="text" id="osQuery" class="text-input os-query-input" placeholder="e.g. The Matrix" autocomplete="off">
                    <button type="button" class="secondary-btn os-search-btn" id="osSearchBtn">Search subtitles</button>
                </div>
                <label class="inline-check" style="margin-top:12px;">
                    <input type="checkbox" id="osAnyLanguage">
                    Search all languages (ignore Original Language filter for search)
                </label>
                <div id="osSearchStatus" class="hint-text" aria-live="polite"></div>
                <div id="osLangChips" class="lang-chips" hidden></div>
                <div class="os-table-wrap">
                    <table class="os-results-table" id="osResultsTable" hidden>
                        <thead>
                            <tr>
                                <th>Title / release</th>
                                <th>Language</th>
                                <th>Info</th>
                            </tr>
                        </thead>
                        <tbody id="osResultsBody"></tbody>
                    </table>
                </div>
                <div id="osPager" class="os-pager" hidden>
                    <label class="os-pager-label">Results per page
                        <select id="osPerPageSelect" class="os-pager-select">
                            <option value="10">10</option>
                            <option value="25" selected>25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </label>
                    <div class="os-pager-nav">
                        <button type="button" class="secondary-btn os-pager-btn" id="osPagePrev">Previous</button>
                        <span id="osPageInfo" class="os-page-info" aria-live="polite"></span>
                        <button type="button" class="secondary-btn os-pager-btn" id="osPageNext">Next</button>
                    </div>
                </div>
            </div>

            <div class="form-group" id="uploadPanel" hidden>
                <label for="srtFile">Select Subtitle File (SRT, ASS, SSA, SUB):</label>
                <div class="file-input-wrapper">
                    <input type="file" id="srtFile" name="srtFile" accept=".srt,.ass,.ssa,.sub" class="file-input">
                    <div class="file-input-display" id="fileDisplay">
                        <span class="file-icon">📁</span>
                        <span class="file-text">Click to browse or drag SRT, ASS, SSA, or SUB file here</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="sourceLanguage">Original Language:</label>
                <select id="sourceLanguage" name="sourceLanguage" required>
                    <!-- <option value="">Select source language</option> -->
                    <option value="en" selected>English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="zh-cn">Chinese (Simplified)</option>
                    <option value="zh-tw">Chinese (Traditional)</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ar">Arabic</option>
                    <option value="hi">Hindi</option>
                    <option value="nl">Dutch</option>
                    <option value="sv">Swedish</option>
                    <option value="da">Danish</option>
                    <option value="no">Norwegian</option>
                    <option value="fi">Finnish</option>
                    <option value="pl">Polish</option>
                    <option value="tr">Turkish</option>
                    <option value="he">Hebrew</option>
                </select>
            </div>

            <div class="form-group">
                <label for="targetLanguage">Target Language:</label>
                <select id="targetLanguage" name="targetLanguage" required>
                    <!-- <option value="">Select target language</option> -->
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="zh-cn">Chinese (Simplified)</option>
                    <option value="zh-tw">Chinese (Traditional)</option>
                    <option value="zh-cn-pinyin" selected>Chinese (Simplified) + Pinyin</option>
                    <option value="zh-tw-pinyin">Chinese (Traditional) + Pinyin</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ar">Arabic</option>
                    <option value="hi">Hindi</option>
                    <option value="nl">Dutch</option>
                    <option value="sv">Swedish</option>
                    <option value="da">Danish</option>
                    <option value="no">Norwegian</option>
                    <option value="fi">Finnish</option>
                    <option value="pl">Polish</option>
                    <option value="tr">Turkish</option>
                    <option value="he">Hebrew</option>
                </select>
            </div>

            <div class="form-group">
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <input type="checkbox" id="dualLanguage" name="dualLanguage" checked style="width:18px; height:18px; cursor:pointer;" value="true"/>
                    Show both original (top) and translation (bottom) subtitles
                </label>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressPercent" style="display:none; text-align:right; margin:-14px 0 20px 0; font-size:0.95em; color:#555; font-weight:600;">0%</div>

            <button type="button" class="translate-btn" id="translateBtn">
                <span class="loading-spinner" id="loadingSpinner"></span>
                <span id="btnText">Translate Subtitles</span>
            </button>
        </form>

        <dialog id="translateConfirmDialog" class="confirm-dialog">
            <div class="confirm-dialog-inner">
                <h3 class="confirm-dialog-title">Start translation?</h3>
                <p id="translateConfirmSummary" class="confirm-dialog-body"></p>
                <div class="confirm-dialog-actions">
                    <button type="button" class="secondary-btn" id="translateConfirmCancel">Cancel</button>
                    <button type="button" class="translate-btn confirm-dialog-confirm" id="translateConfirmOk">Confirm</button>
                </div>
            </div>
        </dialog>

        <div class="download-section" id="downloadSection">
            <div class="success-message">Translation completed successfully! 🎉</div>
            <a href="#" class="download-btn" id="downloadBtn" download>
                📥 Download Translated SRT
            </a>
            <div id="translationDuration" style="margin-top:20px; color:#555; font-size:1.1em;"></div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
